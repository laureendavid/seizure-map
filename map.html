<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      #map {
        width: 100vw;
        height: 100vh;
      }
      .locate-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 1000;
        background: white;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
      }
      .legend {
        position: absolute;
        bottom: 30px;
        left: 10px;
        z-index: 1000;
        background: white;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <button class="locate-btn" onclick="locateMe()">
      📍 Use My Current Location
    </button>
    <div class="legend">
      <b>Alert Types</b><br />
      🟣 Seizure<br />
      🟠 Fall<br />
      🔴 Panic
    </div>

    <script>
      // ── FIREBASE CONFIG ───────────────────────────────────────────────────
      // PALITAN mo ang apiKey ng tama mula sa Firebase Console
      const firebaseConfig = {
        apiKey: "REPLACE_WITH_YOUR_API_KEY",
        authDomain: "capstone-2fedw8.firebaseapp.com",
        projectId: "capstone-2fedw8",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // ── MAP INIT ──────────────────────────────────────────────────────────
      const map = L.map("map").setView([14.7948, 120.9252], 14);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
        maxZoom: 19,
      }).addTo(map);

      const markerCluster = L.markerClusterGroup();
      map.addLayer(markerCluster);

      // ── ICON per alert type ───────────────────────────────────────────────
      function getIcon(type) {
        const colors = {
          seizure: "#a855f7",
          fall: "#f97316",
          panic: "#ef4444",
        };
        const color = colors[(type || "").toLowerCase()] || "#6b7280";

        return L.divIcon({
          className: "",
          html: `<div style="
          width:28px; height:28px;
          background:${color};
          border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);
          border:3px solid white;
          box-shadow:0 2px 6px rgba(0,0,0,0.4);
        "></div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 28],
          popupAnchor: [0, -30],
        });
      }

      // ── FETCH ALERTS — real-time listener ────────────────────────────────
      function loadAlertsFromFirestore() {
        db.collection("alerts")
          .where("status", "==", "unacknowledged")
          .onSnapshot(function (snapshot) {
            markerCluster.clearLayers();

            snapshot.forEach(function (doc) {
              const a = doc.data();
              if (!a.latitude || !a.longitude) return;

              const marker = L.marker([a.latitude, a.longitude], {
                icon: getIcon(a.type),
              });

              const statusColor =
                a.status === "unacknowledged" ? "#ef4444" : "#22c55e";
              const statusLabel =
                a.status === "unacknowledged"
                  ? "🔴 Unacknowledged"
                  : "✅ Acknowledged";

              const time = a.timestamp
                ? new Date(a.timestamp.seconds * 1000).toLocaleString("en-PH", {
                    timeZone: "Asia/Manila",
                  })
                : "N/A";

              marker.bindPopup(`
              <div style="min-width:190px; font-family:Arial; font-size:13px; line-height:1.8;">
                <b style="font-size:14px;">${a.title || "Alert"}</b><br>
                Type: <b>${a.type || ""}</b><br>
                Wearer: ${a.wearerId || ""}<br>
                Time: ${time}<br><br>
                <span style="color:${statusColor}; font-weight:bold; font-size:12px;">
                  ${statusLabel}
                </span>
              </div>
            `);

              markerCluster.addLayer(marker);
            });

            if (markerCluster.getLayers().length > 0) {
              map.fitBounds(markerCluster.getBounds(), { padding: [40, 40] });
            }
          });
      }

      // ── LOCATE ME ─────────────────────────────────────────────────────────
      function locateMe() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function (pos) {
            map.setView([pos.coords.latitude, pos.coords.longitude], 15);
            L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
              radius: 8,
              color: "#3b82f6",
              fillColor: "#3b82f6",
              fillOpacity: 0.8,
            })
              .addTo(map)
              .bindPopup("You are here")
              .openPopup();
          });
        }
      }

      // ── START ─────────────────────────────────────────────────────────────
      loadAlertsFromFirestore();
    </script>
  </body>
</html>
