<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Arial", sans-serif;
        background: #f1f5f9;
      }

      /* ── MAP fills full screen ── */
      #map {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
      }

      /* ── FILTER BUTTONS at the bottom ── */
      .filter-bar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        display: flex;
        gap: 8px;
        background: white;
        padding: 8px 12px;
        border-radius: 30px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }
      .filter-btn {
        border: none;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        opacity: 0.35;
        transition: all 0.2s;
      }
      .filter-btn.active {
        opacity: 1;
        transform: scale(1.05);
      }
      .btn-all {
        background: #1e293b;
        color: white;
      }
      .btn-seizure {
        background: #a855f7;
        color: white;
      }
      .btn-fall {
        background: #f97316;
        color: white;
      }
      .btn-panic {
        background: #ef4444;
        color: white;
      }

      /* ── LOCATE button ── */
      .locate-btn {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 1000;
        background: white;
        border: none;
        padding: 9px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      /* ── ALERT COUNT BADGE ── */
      .alert-badge {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 1000;
        background: #ef4444;
        color: white;
        padding: 7px 14px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <!-- Alert count -->
    <div class="alert-badge" id="alertBadge">Loading...</div>

    <!-- Locate button -->
    <button class="locate-btn" onclick="locateMe()">📍 My Location</button>

    <!-- Filter buttons at bottom -->
    <div class="filter-bar">
      <button class="filter-btn btn-all active" onclick="setFilter('all')">
        All
      </button>
      <button class="filter-btn btn-seizure" onclick="setFilter('seizure')">
        🟣 Seizure
      </button>
      <button class="filter-btn btn-fall" onclick="setFilter('fall')">
        🟠 Fall
      </button>
      <button class="filter-btn btn-panic" onclick="setFilter('panic')">
        🔴 Panic
      </button>
    </div>

    <script>
      // ── FIREBASE ──────────────────────────────────────────────────────────
      const firebaseConfig = {
        apiKey: "AIzaSyCfhXtIo7JahGIZ2OQ-t_CUs3ou9xMoxsk",
        authDomain: "capstone-2fedw8.firebaseapp.com",
        projectId: "capstone-2fedw8",
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // ── MAP ───────────────────────────────────────────────────────────────
      const map = L.map("map", { zoomControl: true }).setView(
        [14.7948, 120.9252],
        14,
      );
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
        maxZoom: 19,
      }).addTo(map);

      const markerCluster = L.markerClusterGroup();
      map.addLayer(markerCluster);

      let allAlerts = [];
      let currentFilter = "all";

      // ── ICON ──────────────────────────────────────────────────────────────
      function getIcon(type) {
        const colors = {
          seizure: "#a855f7",
          fall: "#f97316",
          panic: "#ef4444",
        };
        const color = colors[(type || "").toLowerCase()] || "#6b7280";
        return L.divIcon({
          className: "",
          html: `<div style="
          width:30px; height:30px;
          background:${color};
          border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);
          border:3px solid white;
          box-shadow:0 2px 8px rgba(0,0,0,0.35);
        "></div>`,
          iconSize: [30, 30],
          iconAnchor: [15, 30],
          popupAnchor: [0, -32],
        });
      }

      // ── RENDER ────────────────────────────────────────────────────────────
      function renderMarkers() {
        markerCluster.clearLayers();

        const filtered =
          currentFilter === "all"
            ? allAlerts
            : allAlerts.filter(
                (a) => (a.type || "").toLowerCase() === currentFilter,
              );

        // Update badge
        const unack = filtered.filter(
          (a) => a.status === "unacknowledged",
        ).length;
        document.getElementById("alertBadge").textContent =
          unack > 0 ? `🔴 ${unack} Unacknowledged` : `✅ All Acknowledged`;

        filtered.forEach(function (a) {
          if (!a.latitude || !a.longitude) return;

          const marker = L.marker([a.latitude, a.longitude], {
            icon: getIcon(a.type),
          });

          const isUnack = a.status === "unacknowledged";
          const time = a.timestamp
            ? new Date(a.timestamp.seconds * 1000).toLocaleString("en-PH", {
                timeZone: "Asia/Manila",
              })
            : "N/A";

          marker.bindPopup(`
          <div style="font-family:Arial; font-size:14px; line-height:2; min-width:200px;">
            <b style="font-size:15px;">${a.title || "Alert"}</b><br>
            <span>📌 Type: <b>${(a.type || "").toUpperCase()}</b></span><br>
            <span>👤 Wearer: ${a.wearerId || "Unknown"}</span><br>
            <span>🕐 ${time}</span><br><br>
            <span style="
              display:inline-block;
              background:${isUnack ? "#fee2e2" : "#dcfce7"};
              color:${isUnack ? "#dc2626" : "#16a34a"};
              padding:3px 10px; border-radius:12px;
              font-size:12px; font-weight:bold;
            ">${isUnack ? "🔴 Needs Attention" : "✅ Acknowledged"}</span>
          </div>
        `);

          markerCluster.addLayer(marker);
        });

        if (markerCluster.getLayers().length > 0) {
          map.fitBounds(markerCluster.getBounds(), { padding: [60, 60] });
        }
      }

      // ── FILTER ────────────────────────────────────────────────────────────
      function setFilter(type) {
        currentFilter = type;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        const map2 = {
          all: "btn-all",
          seizure: "btn-seizure",
          fall: "btn-fall",
          panic: "btn-panic",
        };
        document.querySelector("." + map2[type]).classList.add("active");
        renderMarkers();
      }

      // ── FIRESTORE ─────────────────────────────────────────────────────────
      db.collection("alerts").onSnapshot(function (snapshot) {
        allAlerts = [];
        snapshot.forEach((doc) => allAlerts.push(doc.data()));
        renderMarkers();
      });

      // ── LOCATE ────────────────────────────────────────────────────────────
      function locateMe() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(function (pos) {
            map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
              radius: 10,
              color: "#3b82f6",
              fillColor: "#3b82f6",
              fillOpacity: 0.8,
            })
              .addTo(map)
              .bindPopup("<b>You are here</b>")
              .openPopup();
          });
        }
      }
    </script>
  </body>
</html>
